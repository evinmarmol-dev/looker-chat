<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<style>
body { font-family: Arial; background:#f7f7f7; }
#chat { max-width: 600px; margin: auto; background: white; padding: 10px; }
.msg { margin: 8px 0; }
.user { font-weight: bold; }
.bot { color: #0b5cff; }
</style>
</head>
<body>

<div id="chat">
  <div id="messages"></div>
  <input id="q" placeholder="Escribe tu pregunta..." style="width:80%" />
  <button onclick="send()">Enviar</button>
</div>

<script>
const WEBHOOK = "https://evin8n.app.n8n.cloud/webhook-test/looker-chat";

function addMsg(text, cls) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.innerText = text;
  document.getElementById("messages").appendChild(d);
}

async function send() {
  const q = document.getElementById("q").value;
  addMsg("Tú: " + q, "user");
  document.getElementById("q").value = "";

  const r = await fetch(WEBHOOK, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ question: q })
  });

  const j = await r.json();
  addMsg("Bot: " + j.answer, "bot");
}
</script>

</body>

</html>
